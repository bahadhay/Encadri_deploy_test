<div class="layout-container">
  <!-- Toast Notifications -->
  <app-notification-toast></app-notification-toast>

  <!-- Sidebar -->
  <aside class="sidebar" [class.closed]="!isSidebarOpen">
    <div class="logo-area">
      <h1 *ngIf="isSidebarOpen">Encadri</h1>
      <button class="toggle-btn" (click)="toggleSidebar()">☰</button>
    </div>

    <nav class="nav-links">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
        <span class="icon">📊</span>
        <span *ngIf="isSidebarOpen">Dashboard</span>
      </a>
      <a routerLink="/projects" routerLinkActive="active" class="nav-item">
        <span class="icon">📁</span>
        <span *ngIf="isSidebarOpen">Projects</span>
      </a>
      <a routerLink="/submissions" routerLinkActive="active" class="nav-item">
        <span class="icon">📝</span>
        <span *ngIf="isSidebarOpen">Submissions</span>
      </a>
      <a routerLink="/chat" routerLinkActive="active" class="nav-item">
        <span class="icon">💬</span>
        <span *ngIf="isSidebarOpen">Chat</span>
      </a>
      <a routerLink="/profile" routerLinkActive="active" class="nav-item">
        <span class="icon">👤</span>
        <span *ngIf="isSidebarOpen">Profile</span>
      </a>
      <!-- Add more links as needed -->
    </nav>

    <div class="user-area" *ngIf="isSidebarOpen">
      <div class="user-info">
        <p class="user-name">{{ authService.currentUser()?.fullName }}</p>
        <p class="user-role">{{ authService.currentUser()?.userRole }}</p>
      </div>
      <button class="logout-btn" (click)="logout()">Logout</button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="top-bar">
      <div class="breadcrumbs">
        <!-- Breadcrumbs or page title could go here -->
      </div>
      
      <div class="top-actions">
        <!-- Notification Bell (New SignalR Real-time) -->
        <app-notification-bell></app-notification-bell>
      </div>
    </header>

    <div class="content-wrapper">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
